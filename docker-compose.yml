version: '3.8'

services:
  api:
    build: .
    container_name: helix-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DEBUG=false
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - helix-network

  redis:
    image: redis:7-alpine
    container_name: helix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - helix-network

volumes:
  redis_data:

networks:
  helix-network:
    driver: bridge
